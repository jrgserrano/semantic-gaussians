model:
  source_path: "/home/ubuntu/datasets/Replica/office1"
  model_path: "outputs/Replica/office1"
  eval: false
  init_type: ply
  init_points: 100000
  num_frames: -1
  nth_frames: 4
  mask_subdir: "sam"
