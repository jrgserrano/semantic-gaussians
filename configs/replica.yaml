  random_background_features: true
  inst2d_lambda: 0.1
  var_lambda: 0.5
  lambda_depth: 0.1

cluster:
  enabled: true
  min_size: 32
  min_samples: 16

lang:
  enabled: true
  model: masqclip
  topk: 5

desc:
  enabled: true
  debug: true
